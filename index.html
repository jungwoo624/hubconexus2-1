<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future-Sim | AI 알고리즘 윤리 시뮬레이터</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    
    <!-- External JS -->
    <script src="main.js" defer></script>
</head>
<body>

<header>
    <h1>FUTURE-SIM LAB <small>v2.0 Global Ethics Monitor</small></h1>
    <div style="display: flex; align-items: center;">
        <div id="date">2026.04.03 | Global Scale</div>
        <button class="theme-toggle" id="themeToggle" title="테마 변경">
            <svg id="themeIcon" viewBox="0 0 24 24">
                <path d="M12,18c-3.3,0-6-2.7-6-6s2.7-6,6-6s6,2.7,6,6S15.3,18,12,18zM12,8c-2.2,0-4,1.8-4,4s1.8,4,4,4s4-1.8,4-4S14.2,8,12,8z"></path>
                <path d="M12,4V2c0-0.6-0.4-1-1-1s-1,0.4-1,1v2c0,0.6,0.4,1,1,1S12,4.6,12,4z"></path>
                <path d="M12,20v2c0,0.6-0.4,1-1,1s-1-0.4-1-1v-2c0-0.6,0.4-1,1-1S12,19.4,12,20z"></path>
                <path d="M5.6,6.4l-1.4-1.4c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4l1.4,1.4c0.4,0.4,1,0.4,1.4,0S6,6.8,5.6,6.4z"></path>
                <path d="M19.8,17.7l-1.4-1.4c-0.4-0.4-1-0.4-1.4,0s-0.4,1,0,1.4l1.4,1.4c0.4,0.4,1,0.4,1.4,0S20.2,18.1,19.8,17.7z"></path>
                <path d="M20,11h2c0.6,0,1,0.4,1,1s-0.4,1-1,1h-2c-0.6,0-1-0.4-1-1S19.4,11,20,11z"></path>
                <path d="M2,11h2c0.6,0,1,0.4,1,1s-0.4,1-1,1H2c-0.6,0-1-0.4-1-1S1.4,11,2,11z"></path>
                <path d="M6.4,18.4l-1.4,1.4c-0.4,0.4-0.4,1,0,1.4s1,0.4,1.4,0l1.4-1.4c0.4-0.4,0.4-1,0-1.4S6.8,18,6.4,18.4z"></path>
                <path d="M18.4,6.4l1.4-1.4c0.4-0.4,0.4-1,0-1.4s-1-0.4-1.4,0l-1.4,1.4c-0.4,0.4-0.4,1,0,1.4S18,6.8,18.4,6.4z"></path>
            </svg>
        </button>
    </div>
</header>

<div class="container">
    <aside class="panel">
        <h2>Algorithm Config</h2>
        <p class="scenario-desc">시나리오: 국가 보조금 배분 알고리즘 설계</p>
        
        <div class="control-group">
            <label>성과 중심 가중치 (Efficiency) <span id="val1">50%</span></label>
            <input type="range" id="effWeight" class="slider" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label>필요(복지) 중심 가중치 (Equity) <span id="val2">50%</span></label>
            <input type="range" id="eqWeight" class="slider" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label>다양성/소수자 보호 (Diversity) <span id="val3">30%</span></label>
            <input type="range" id="divWeight" class="slider" min="0" max="100" value="30">
        </div>

        <button class="btn-run" onclick="runSimulation()">알고리즘 배포 및 분석 실행</button>

        <div class="ai-feedback">
            <div class="ai-avatar">AIHP</div>
            <div class="ai-msg" id="aiMsg">
                <strong>[AIHP 대기중]</strong> 반갑습니다! 저는 유네스코 AI 윤리 감사관 <strong>AIHP</strong>입니다. 좌측의 슬라이더를 조절하여 당신만의 사회 정책 알고리즘을 만들어보세요.
            </div>
        </div>
    </aside>

    <main class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <span>사회적 행복도</span>
                <h3 id="happyScore" style="color: var(--text-muted);">--</h3>
            </div>
            <div class="stat-card">
                <span>불평등 지수 (Gini)</span>
                <h3 id="giniScore" style="color: var(--text-muted);">--</h3>
            </div>
            <div class="stat-card">
                <span>사회 갈등 위험</span>
                <h3 id="conflictScore" style="color: var(--text-muted);">--</h3>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="impactChart"></canvas>
        </div>
        
        <p class="footer-note">* 본 시뮬레이션은 2026 AX 사회안전망 표준 데이터를 기반으로 연산됩니다.</p>
    </main>
</div>

</body>
</html>
